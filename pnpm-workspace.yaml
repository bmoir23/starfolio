# Approves native dependency build scripts so `pnpm install` does not abort.
# pnpm v10 (used by Cloudflare's build image) reads `onlyBuiltDependencies`.
onlyBuiltDependencies:
  - esbuild
  - sharp
  - workerd

# pnpm v11+ replaced the list above with the `allowBuilds` map.
allowBuilds:
  esbuild: true
  sharp: true
  workerd: true
